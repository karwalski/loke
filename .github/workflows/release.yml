name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: Build Release Artifacts
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        arch: [x86-64, arm64]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build release binaries
        run: |
          echo "Building loke ${{ github.ref_name }} for ${{ matrix.os }}/${{ matrix.arch }}"
          # tkc packages/cli/src/main.tk -o dist/loke-${{ matrix.arch }} --profile2 --release
          # ooke build --config packages/browser/ooke.toml --release
        continue-on-error: true
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loke-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/
