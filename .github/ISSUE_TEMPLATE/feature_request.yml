name: Feature Request
description: Propose a new feature or enhancement for loke
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement. For significant architectural changes, consider the [RFC process](https://github.com/karwalski/loke/blob/main/GOVERNANCE.md).

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What need does it address?
      placeholder: I'm frustrated when ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would this feature work from a user's perspective?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider? Why is this approach better?

  - type: dropdown
    id: mode
    attributes:
      label: Which mode does this affect?
      options:
        - Browser mode
        - Terminal mode (CLI)
        - Terminal mode (proxy)
        - Both modes
        - Core engine (mode-agnostic)
        - MCP
        - Policy / compliance
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: privacy-impact
    attributes:
      label: Privacy impact
      description: Does this feature affect how data flows through loke's pipeline?
      options:
        - "No — no change to data flow"
        - "Yes — changes how data is processed or routed"
        - "Yes — introduces new data leaving the device"
        - "Unsure"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any relevant references, prior art, screenshots, or mockups.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and feature requests for duplicates
          required: true
