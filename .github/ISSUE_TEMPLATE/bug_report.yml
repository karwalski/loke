name: Bug Report
description: Report a bug in loke
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in the details below so we can investigate.

        **Important:** If this bug involves a security vulnerability or potential data leak, do NOT use this form. Instead, report it privately via [GitHub Security Advisories](https://github.com/karwalski/loke/security/advisories/new) or see [SECURITY.md](https://github.com/karwalski/loke/blob/main/SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Detailed steps to reproduce the behaviour.
      placeholder: |
        1. Run `loke ask --model ...`
        2. Provide input containing ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened.
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Operating mode
      options:
        - Browser mode
        - Terminal mode (CLI)
        - Terminal mode (proxy)
        - Both
        - Not applicable
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: loke version
      description: Output of `loke --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide:
        - OS and version (e.g., macOS 15.2, Apple M3)
        - Node.js version
        - Ollama version (if applicable)
      placeholder: |
        - macOS 15.2 (Apple M3 Pro, 36GB)
        - Node.js 20.11.0
        - Ollama 0.6.2
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Include any relevant log output. Run with `--verbose` for detailed pipeline logs.
        **Do not include PII, API keys, or sensitive data in logs.**
      render: shell

  - type: dropdown
    id: privacy-impact
    attributes:
      label: Privacy impact
      description: Does this bug involve potential data leakage or privacy concerns?
      options:
        - "No — functional bug only"
        - "Possibly — PII detection may have been affected"
        - "Yes — data may have been sent unfiltered"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I have removed all PII and sensitive data from this report
          required: true
