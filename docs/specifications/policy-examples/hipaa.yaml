# =============================================================================
# loke Policy Preset: US HIPAA (Health Insurance Portability and
#                     Accountability Act)
# =============================================================================
#
# Implements requirements from HIPAA and its implementing regulations:
#
#   - Privacy Rule (45 CFR Part 160, Part 164 Subparts A & E):
#     - Protected Health Information (PHI) — individually identifiable health
#       information held or transmitted by a covered entity or business associate
#     - 18 HIPAA Identifiers that must be removed for de-identification
#       (Safe Harbor method, 45 CFR 164.514(b)(2))
#     - Minimum Necessary Rule (45 CFR 164.502(b)) — use, disclose, and request
#       only the minimum necessary PHI for the intended purpose
#     - Notice of Privacy Practices
#     - Individual rights (access, amendment, accounting of disclosures)
#
#   - Security Rule (45 CFR Part 164 Subpart C):
#     - Administrative, physical, and technical safeguards
#     - Access controls, audit controls, transmission security
#     - Encryption (addressable specification — but effectively required)
#
#   - Breach Notification Rule (45 CFR Part 164 Subpart D):
#     - Notification within 60 days for breaches affecting 500+ individuals
#     - Notification without unreasonable delay for smaller breaches
#     - Presumption of breach unless low probability of compromise demonstrated
#
#   - Business Associate Agreement (BAA) requirements:
#     - Any entity that creates, receives, maintains, or transmits PHI on
#       behalf of a covered entity must have a BAA
#     - Cloud LLM providers processing PHI are business associates
#
#   - HITECH Act (2009):
#     - Extended HIPAA requirements to business associates
#     - Strengthened breach notification and enforcement
#     - Increased penalties for willful neglect
#
# CRITICAL: This policy assumes the organisation is a covered entity or
# business associate under HIPAA. If your organisation processes PHI, you
# MUST have BAAs in place with any cloud LLM provider before allowing PHI
# transmission — even after de-identification. This policy enforces
# de-identification as a technical safeguard but does not replace the legal
# requirement for BAAs.
#
# =============================================================================

policy_version: "1.0"

metadata:
  name: "US HIPAA Compliance"
  id: "hipaa"
  description: >
    Privacy and security policy implementing HIPAA Privacy Rule, Security
    Rule, and Breach Notification Rule requirements for LLM interactions.
    Enforces PHI de-identification using the Safe Harbor method (removal of
    18 identifiers), minimum necessary principle, BAA-gated provider access,
    and comprehensive audit logging.
  author: "loke project"
  created: "2026-04-01T00:00:00Z"
  updated: "2026-04-01T00:00:00Z"
  regulation_basis:
    - "us-hipaa"
    - "us-hitech"
  tags:
    - "preset"
    - "us"
    - "hipaa"
    - "healthcare"
    - "phi"

# =============================================================================
# Data Classification
# =============================================================================
# HIPAA defines Protected Health Information (PHI) as individually
# identifiable health information. The Safe Harbor de-identification method
# (45 CFR 164.514(b)(2)) lists 18 identifiers that must be removed.
#
# This classification scheme maps HIPAA concepts:
#   - Non-PHI -> public / internal
#   - PHI (individually identifiable health info) -> phi
#   - PHI with the 18 identifiers -> phi-identified (highest risk)
#   - Data that must never leave (unprocessed PHI) -> prohibited

data_classification:
  levels:
    - id: public
      name: "Public / De-identified"
      description: "Information that has been de-identified per Safe Harbor method (45 CFR 164.514(b)(2)) — all 18 identifiers removed and no actual knowledge that residual information could identify an individual"
      color: "#22c55e"

    - id: internal
      name: "Internal / Non-PHI"
      description: "Business information that does not constitute Protected Health Information. Administrative data, de-identified aggregate statistics, publicly available health information."
      color: "#3b82f6"

    - id: phi-limited
      name: "Limited Data Set"
      description: "PHI with direct identifiers removed but retaining dates, city/state, and zip codes (45 CFR 164.514(e)). Requires data use agreement. Less restrictive than full PHI but still protected."
      color: "#f59e0b"

    - id: phi
      name: "Protected Health Information (PHI)"
      description: "Individually identifiable health information including any of the 18 HIPAA identifiers combined with health data. Subject to full HIPAA protections."
      color: "#ef4444"

    - id: prohibited
      name: "Prohibited"
      description: "Psychotherapy notes (45 CFR 164.501), substance abuse records (42 CFR Part 2), and any PHI for which the individual has exercised their right to restrict disclosure."
      color: "#7f1d1d"

  # Minimum Necessary Rule — when in doubt, treat as PHI
  default_level: phi

  rules:
    # =========================================================================
    # The 18 HIPAA Safe Harbor Identifiers (45 CFR 164.514(b)(2))
    # Each of these must be removed for data to be considered de-identified
    # =========================================================================

    # 1. Names
    - pattern: person_name
      level: phi
      description: "HIPAA identifier #1: Names"

    # 2. Geographic data smaller than state (street address, city, zip code)
    - pattern: street_address
      level: phi
      description: "HIPAA identifier #2: Geographic subdivisions smaller than state"

    # 3. Dates (except year) related to an individual
    - pattern: date_of_birth
      level: phi
      description: "HIPAA identifier #3: All dates (except year) directly related to an individual, including birth date, admission date, discharge date, death date"

    # 4. Telephone numbers
    - pattern: phone_number
      level: phi
      description: "HIPAA identifier #4: Telephone numbers"

    # 5. Fax numbers (detected as phone numbers)
    # Covered by phone_number pattern

    # 6. Email addresses
    - pattern: email_address
      level: phi
      description: "HIPAA identifier #6: Email addresses"

    # 7. Social Security Numbers
    - pattern: ssn
      level: phi
      description: "HIPAA identifier #7: Social Security Numbers"

    # 8. Medical record numbers
    - pattern: medical_record
      level: phi
      description: "HIPAA identifier #8: Medical record numbers, and all health data"

    # 9. Health plan beneficiary numbers
    # Detected by medical_record and custom patterns

    # 10. Account numbers
    - pattern: iban
      level: phi
      description: "HIPAA identifier #10: Account numbers"
    - pattern: credit_card
      level: phi
      description: "HIPAA identifier #10: Account numbers (credit/debit cards)"
    - pattern: financial_record
      level: phi
      description: "HIPAA identifier #10: Account numbers (financial records)"

    # 11. Certificate/licence numbers
    # Detected via custom regex patterns per organisation

    # 12. Vehicle identifiers and serial numbers
    # Detected via custom regex patterns per organisation

    # 13. Device identifiers and serial numbers
    # Detected via custom regex patterns per organisation

    # 14. Web URLs
    # Note: URLs can be identifiers when they contain patient-specific paths
    - pattern: "regex:https?://[^\\s]*patient[^\\s]*"
      level: phi
      description: "HIPAA identifier #14: Web URLs containing patient-specific paths"

    # 15. IP addresses
    - pattern: ip_address
      level: phi
      description: "HIPAA identifier #15: Internet Protocol (IP) addresses"

    # 16. Biometric identifiers
    - pattern: genetic_data
      level: phi
      description: "HIPAA identifier #16: Biometric identifiers including genetic data"

    # 17. Full-face photographs and comparable images
    # Detection requires image analysis — outside loke's current text-based scope

    # 18. Any other unique identifying number, characteristic, or code
    - pattern: "regex:[A-Z]{2,3}-\\d{6,}"
      level: phi
      description: "HIPAA identifier #18: Potential unique identifiers (organisation-specific codes)"

    # Credentials — always prohibited
    - pattern: api_key
      level: prohibited
      description: "Credentials must never be transmitted"
    - pattern: password
      level: prohibited
      description: "Credentials must never be transmitted"

# =============================================================================
# Provider Restrictions
# =============================================================================
# Under HIPAA, any cloud LLM provider that receives, creates, maintains, or
# transmits PHI is a "business associate" and MUST have a BAA in place.
#
# Even with de-identification, the organisation should have BAAs as a
# defence-in-depth measure — de-identification can fail, and the BAA provides
# legal protection if PHI is inadvertently disclosed.
#
# As of 2026, major providers offering BAAs:
#   - Anthropic: BAA available for enterprise plans
#   - OpenAI: BAA available for enterprise and team plans
#   - Google: BAA available via Google Cloud / Vertex AI
#   - Microsoft/Azure: BAA available via Azure OpenAI Service
#
# IMPORTANT: The "action: allow" entries below assume a BAA is in place.
# Organisations must verify BAA status independently.

provider_restrictions:
  default_action: deny

  providers:
    # Local models — no BAA needed, PHI stays on-device
    - id: local
      action: allow
      max_classification: prohibited
      note: "Local processing — no disclosure, no BAA required"

    - id: ollama
      action: allow
      max_classification: prohibited
      note: "Local processing via Ollama"

    # Cloud providers — BAA MUST be in place
    # max_classification set to phi-limited: even with BAA, full PHI should
    # be de-identified before cloud transmission (defense in depth)
    - id: anthropic
      action: allow
      max_classification: phi-limited
      require_encryption: true
      note: >
        REQUIRES active BAA with Anthropic. Verify BAA covers LLM API usage.
        PHI must be de-identified before transmission — BAA is a safety net,
        not a substitute for de-identification.

    - id: openai
      action: allow
      max_classification: phi-limited
      require_encryption: true
      note: "REQUIRES active BAA with OpenAI"

    - id: google
      action: allow
      max_classification: phi-limited
      regions:
        - "us"
      require_encryption: true
      note: "REQUIRES active BAA. Use Vertex AI (not consumer Gemini)."

    # Explicitly deny providers unlikely to have BAAs
    - id: mistral
      action: deny
      reason: >
        Mistral does not currently offer BAAs for HIPAA compliance.
        PHI must not be sent to providers without BAAs.

    - id: "*"
      action: deny
      reason: >
        Provider not approved for HIPAA-regulated data. A Business Associate
        Agreement (BAA) must be in place before any provider can receive PHI
        or limited data sets. Contact your HIPAA Privacy Officer.

# =============================================================================
# MCP Server Controls
# =============================================================================
# MCP servers that access PHI are also subject to HIPAA. Local MCP servers
# on the user's device are acceptable (no disclosure). Cloud/remote MCP
# servers require BAAs and de-identification.

mcp_servers:
  default_action: deny

  servers:
    # Local MCP servers — PHI stays on-device
    - pattern: "filesystem"
      action: allow
      max_classification: phi
      data_filters:
        - exclude_patterns:
            - "*.env"
            - "*.pem"
            - "*.key"
            - "*credentials*"
            - "*secret*"
      note: "Local filesystem — PHI does not leave device"

    - pattern: "git"
      action: allow
      max_classification: internal     # Git repos should not contain PHI
      note: "Git — ensure no PHI is committed to repositories"

    - pattern: "database-*"
      action: allow
      max_classification: phi
      data_filters:
        # Mask all 18 HIPAA identifiers when present as database columns
        - mask_columns:
            - "name"
            - "first_name"
            - "last_name"
            - "patient_name"
            - "address"
            - "street"
            - "city"
            - "zip"
            - "zip_code"
            - "postal_code"
            - "date_of_birth"
            - "dob"
            - "admission_date"
            - "discharge_date"
            - "death_date"
            - "phone"
            - "fax"
            - "email"
            - "ssn"
            - "social_security"
            - "mrn"
            - "medical_record_number"
            - "health_plan_id"
            - "account_number"
            - "certificate_number"
            - "licence_number"
            - "vehicle_id"
            - "device_id"
            - "ip_address"

    # All cloud MCP servers denied by default for HIPAA
    - pattern: "slack"
      action: deny
      reason: "Cloud messaging — PHI must not be sent to Slack without BAA and de-identification"

    - pattern: "*"
      action: deny
      reason: "MCP server not approved for HIPAA-regulated environments. Requires BAA and privacy officer approval."

  tool_controls:
    - server: "database-*"
      tool: "execute_query"
      action: allow
      constraints:
        read_only: true                # No writes — minimum necessary

    # Prevent file writes that could create uncontrolled PHI copies
    - server: "filesystem"
      tool: "write_file"
      action: deny
      reason: "File writes disabled — prevents uncontrolled PHI duplication"

# =============================================================================
# Sensitivity Thresholds
# =============================================================================
# HIPAA's Minimum Necessary Rule (45 CFR 164.502(b)) requires that covered
# entities make reasonable efforts to use, disclose, and request only the
# minimum necessary PHI. Detection thresholds are set very conservatively.
#
# The Breach Notification Rule creates strong incentives to avoid any PHI
# exposure — even a single record breach requires notification to the
# individual.

sensitivity_thresholds:
  # Very conservative — maximise detection of potential PHI
  pii_detection_threshold: 0.5
  auto_anonymise_threshold: 0.8
  review_threshold: 0.3

  actions:
    public:
      require_anonymisation: false
      allow_cloud: true
      require_user_confirmation: false
      log_level: info

    internal:
      require_anonymisation: false
      allow_cloud: true
      require_user_confirmation: false
      log_level: info

    phi-limited:
      # Limited data set — still PHI, requires de-identification of
      # direct identifiers and a data use agreement
      require_anonymisation: true
      allow_cloud: true
      require_user_confirmation: true
      log_level: detailed

    phi:
      # Full PHI — de-identify before any external transmission
      require_anonymisation: true
      allow_cloud: true                # Only after de-identification
      require_user_confirmation: true
      log_level: detailed

    prohibited:
      # Psychotherapy notes, substance abuse records, restricted PHI
      require_anonymisation: false
      allow_cloud: false
      require_user_confirmation: false
      log_level: detailed

# =============================================================================
# Budget Limits
# =============================================================================
# No HIPAA-specific budget requirements. Conservative defaults to avoid
# unnecessary PHI processing.

budget_limits:
  currency: "USD"
  global:
    monthly: 100.00
  on_exceed:
    action: warn_and_block
    downgrade_to: "local"
    notification: true
    allow_override: false              # Strict — prevent accidental PHI send to cloud
    message: >
      Monthly budget exceeded. All requests routed to local models.
      Contact your administrator to adjust the budget.
  token_tracking:
    warn_at_percentage: 75
    track_cached_tokens: false

# =============================================================================
# Retention
# =============================================================================
# HIPAA requires retention of certain records:
#   - 45 CFR 164.530(j): Documentation required by the Privacy Rule must be
#     retained for 6 years from date of creation or last effective date
#   - State laws may require longer retention (varies by state)
#   - PHI itself should be retained only as long as needed for treatment,
#     payment, or healthcare operations
#
# For loke's purposes, audit logs are the primary retention concern — they
# must document all PHI access and disclosure for 6 years.

retention:
  # Audit logs — HIPAA requires 6-year retention for privacy documentation
  audit_logs:
    duration: "6y"
    on_expiry: archive

  # Conversation history — minimum necessary, destroy when no longer needed
  conversations:
    duration: "7d"
    on_expiry: delete

  # PII/PHI mappings — destroy immediately after session
  pii_mappings:
    duration: "session"
    on_expiry: secure_delete

  # Semantic cache — short retention, minimise PHI exposure surface
  cache:
    duration: "7d"
    max_size: "1GB"
    on_expiry: delete

  # Deanonymisation window — very short for HIPAA
  # Once expired, de-identification is irreversible (which is the goal)
  deanonymisation_window:
    duration: "1h"

# =============================================================================
# Anonymisation
# =============================================================================
# HIPAA provides two methods for de-identification (45 CFR 164.514):
#
#   1. Expert Determination (164.514(b)(1)): A qualified statistical or
#      scientific expert determines that the risk of identifying any
#      individual is very small.
#
#   2. Safe Harbor (164.514(b)(2)): Remove all 18 specified identifiers and
#      have no actual knowledge that the remaining information could be used
#      to identify an individual.
#
# This policy implements the Safe Harbor method through loke's anonymisation
# pipeline, configured at maximum level with all detection layers active.

anonymisation:
  # Maximum level — all detection layers, plus generalisation
  # This implements the Safe Harbor method by targeting all 18 identifiers
  default_level: maximum

  levels:
    minimal:
      description: "Structured identifiers only — DOES NOT satisfy Safe Harbor"
      layers: [regex]
      placeholder_format: "[$TYPE]"

    standard:
      description: "Structured and named entities — may not satisfy Safe Harbor"
      layers: [regex, nlp]
      placeholder_format: "$t$n"

    comprehensive:
      description: "Full de-identification — targets all 18 Safe Harbor identifiers"
      layers: [regex, nlp, slm_ner, presidio]
      placeholder_format: "$t$n"

    maximum:
      description: "Safe Harbor de-identification with generalisation — recommended for HIPAA"
      layers: [regex, nlp, slm_ner, presidio]
      placeholder_format: "$t$n"
      # Generalisation addresses quasi-identifiers and reduces
      # re-identification risk
      generalise_dates: true           # Dates reduced to year (Safe Harbor: remove all except year)
      generalise_locations: true       # Addresses reduced to state (Safe Harbor: remove below state)
      generalise_ages: true            # Ages 90+ grouped (Safe Harbor: ages 90+ combined)
      suppress_rare_values: true       # Suppress unique combinations that could re-identify

  entity_overrides:
    # All 18 HIPAA identifiers — redact (not reversible)
    # For HIPAA, de-identification should be one-way to satisfy Safe Harbor
    person_name:
      action: redact                   # Identifier #1
    street_address:
      action: redact                   # Identifier #2
    date_of_birth:
      action: redact                   # Identifier #3 (dates)
    phone_number:
      action: redact                   # Identifiers #4, #5 (phone/fax)
    email_address:
      action: redact                   # Identifier #6
    ssn:
      action: redact                   # Identifier #7
    medical_record:
      action: redact                   # Identifier #8
    financial_record:
      action: redact                   # Identifier #10 (account numbers)
    credit_card:
      action: redact                   # Identifier #10
    iban:
      action: redact                   # Identifier #10
    ip_address:
      action: redact                   # Identifier #15
    genetic_data:
      action: redact                   # Identifier #16 (biometric)

    # Non-identifier data — anonymise with reversibility for response
    # reconstruction (clinical context that does not identify patients)
    organisation_name:
      action: anonymise

    # Credentials
    api_key:
      action: redact
    password:
      action: redact

  # Deanonymisation: very limited for HIPAA
  # Only non-identifier data (organisation names) can be deanonymised.
  # All 18 identifiers are redacted (one-way) and cannot be reversed.
  allow_deanonymisation: true
  deanonymisation_requires_auth: true  # Require re-authentication for deanonymisation
