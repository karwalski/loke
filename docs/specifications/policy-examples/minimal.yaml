# =============================================================================
# loke Policy Preset: Minimal (Development / Testing)
# =============================================================================
#
# This policy imposes minimal restrictions on loke's behaviour. It is intended
# for development, testing, and personal experimentation ONLY.
#
# DO NOT use this policy in any environment where:
#   - Real personal data is being processed
#   - Regulatory compliance is required (GDPR, HIPAA, Privacy Act, etc.)
#   - Enterprise data governance policies apply
#   - Client or customer data may be present
#
# This policy:
#   - Allows all LLM providers
#   - Allows all MCP servers
#   - Sets anonymisation to minimal (structured PII only)
#   - Sets generous budget limits
#   - Uses short retention periods
#   - Does not require user confirmation for any operation
#
# Even in minimal mode, loke still detects PII and logs operations. The
# difference is that detection results in logging and advisories rather than
# blocking or mandatory anonymisation.
#
# =============================================================================

policy_version: "1.0"

metadata:
  name: "Minimal (Development / Testing)"
  id: "minimal"
  description: >
    Minimal restrictions for development and testing. Allows all providers,
    all MCP servers, and optional anonymisation. Not suitable for production
    use with real data.
  author: "loke project"
  created: "2026-04-01T00:00:00Z"
  updated: "2026-04-01T00:00:00Z"
  tags:
    - "preset"
    - "development"
    - "testing"
    - "minimal"

# =============================================================================
# Data Classification
# =============================================================================
# Simple two-tier classification: everything is either general or credentials.
# Credentials are still protected even in minimal mode — there is no good
# reason to send API keys to an LLM.

data_classification:
  levels:
    - id: general
      name: "General"
      description: "All data — no restrictions on processing or transmission"
      color: "#22c55e"

    - id: credentials
      name: "Credentials"
      description: "API keys, passwords, tokens — blocked from transmission even in development"
      color: "#ef4444"

  # Default: treat everything as general (no restrictions)
  default_level: general

  rules:
    # Only credentials are protected in minimal mode
    - pattern: api_key
      level: credentials
      description: "API keys should not be sent to LLMs even during development"
    - pattern: password
      level: credentials
      description: "Passwords should not be sent to LLMs even during development"

# =============================================================================
# Provider Restrictions
# =============================================================================
# All providers allowed. No restrictions on models or regions.

provider_restrictions:
  default_action: allow

  providers:
    # Explicitly allow everything
    - id: "*"
      action: allow
      max_classification: general      # Everything except credentials
      note: "Minimal policy — all providers permitted"

    # Local always allowed for everything
    - id: local
      action: allow
      max_classification: credentials  # Local can see credentials too
    - id: ollama
      action: allow
      max_classification: credentials

# =============================================================================
# MCP Server Controls
# =============================================================================
# All MCP servers allowed. No restrictions on tools.

mcp_servers:
  default_action: allow

  servers:
    - pattern: "*"
      action: allow
      max_classification: general
      note: "Minimal policy — all MCP servers permitted"

  # No tool controls — everything allowed

# =============================================================================
# Sensitivity Thresholds
# =============================================================================
# High thresholds — only flag with very high confidence. Detection still runs
# but produces advisories rather than blocks.

sensitivity_thresholds:
  pii_detection_threshold: 0.9         # Only flag high-confidence detections
  auto_anonymise_threshold: 0.99       # Almost never auto-anonymise
  review_threshold: 0.8                # Only flag very likely PII for review

  actions:
    general:
      require_anonymisation: false
      allow_cloud: true
      require_user_confirmation: false
      log_level: minimal

    credentials:
      require_anonymisation: false
      allow_cloud: false               # Credentials still blocked
      require_user_confirmation: false
      log_level: info

# =============================================================================
# Budget Limits
# =============================================================================
# Generous limits. Warn but don't block.

budget_limits:
  currency: "USD"
  global:
    daily: 50.00
    monthly: 500.00
  on_exceed:
    action: warn                       # Warn only, never block
    notification: true
    allow_override: true
    message: "Budget advisory — you've exceeded your configured limit."
  token_tracking:
    warn_at_percentage: 90
    track_cached_tokens: false

# =============================================================================
# Retention
# =============================================================================
# Short retention — development data does not need long-term storage.

retention:
  audit_logs:
    duration: "30d"
    on_expiry: delete                  # No archiving needed for dev

  conversations:
    duration: "30d"
    on_expiry: delete

  pii_mappings:
    duration: "7d"                     # Keep mappings longer for dev debugging
    on_expiry: delete                  # Standard delete, not secure_delete

  cache:
    duration: "30d"
    max_size: "5GB"                    # Generous cache for development
    on_expiry: delete

  deanonymisation_window:
    duration: "7d"                     # Long window for development convenience

# =============================================================================
# Anonymisation
# =============================================================================
# Minimal anonymisation — structured PII detection only, and only as an
# advisory. Users can review what was detected but nothing is automatically
# anonymised.

anonymisation:
  default_level: minimal

  levels:
    minimal:
      description: "Regex-based detection only — advisory, not enforced"
      layers: [regex]
      placeholder_format: "[$TYPE]"

    standard:
      description: "Available if manually selected"
      layers: [regex, nlp]
      placeholder_format: "$t$n"

    comprehensive:
      description: "Available if manually selected"
      layers: [regex, nlp, slm_ner, presidio]
      placeholder_format: "$t$n"

  entity_overrides:
    # Credentials are always redacted, even in minimal mode
    api_key:
      action: redact
    password:
      action: redact

    # Everything else: anonymise (reversible) if anonymisation is triggered,
    # but nothing is triggered automatically due to high thresholds
    email_address:
      action: anonymise
    person_name:
      action: anonymise
    phone_number:
      action: anonymise
    credit_card:
      action: mask

  allow_deanonymisation: true
  deanonymisation_requires_auth: false
