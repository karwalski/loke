# =============================================================================
# loke Policy Preset: Australian Privacy Act 1988
# =============================================================================
#
# Implements requirements from the Privacy Act 1988 (Cth) and the 13
# Australian Privacy Principles (APPs), including:
#
#   - APP 1:  Open and transparent management of personal information
#   - APP 2:  Anonymity and pseudonymity (individuals must have the option)
#   - APP 3:  Collection of solicited personal information (only what is
#             reasonably necessary)
#   - APP 4:  Dealing with unsolicited personal information
#   - APP 5:  Notification of collection
#   - APP 6:  Use or disclosure of personal information (purpose limitation)
#   - APP 7:  Direct marketing restrictions
#   - APP 8:  Cross-border disclosure (reasonable steps to ensure overseas
#             recipient complies with APPs)
#   - APP 9:  Adoption, use or disclosure of government-related identifiers
#   - APP 10: Quality of personal information
#   - APP 11: Security of personal information (reasonable steps to protect)
#   - APP 12: Access to personal information
#   - APP 13: Correction of personal information
#
# Additional considerations:
#   - Tax File Number (TFN) Guidelines — TFN handling under the Tax File
#     Number Guidelines 2015 (extremely restricted)
#   - Notifiable Data Breaches (NDB) scheme — Part IIIC of the Privacy Act
#   - My Health Records Act 2012 — health record protections
#   - Consumer Data Right (CDR) — additional obligations for banking/energy
#   - Privacy Act Review 2022-2025 — anticipated reforms including a
#     statutory tort for serious invasion of privacy
#
# This preset is a starting point. Review with your privacy officer to ensure
# it aligns with your organisation's specific obligations and OAIC guidance.
#
# =============================================================================

policy_version: "1.0"

metadata:
  name: "Australian Privacy Act Compliance"
  id: "au-privacy-act"
  description: >
    Privacy policy implementing Australian Privacy Act 1988 and the 13
    Australian Privacy Principles (APPs). Covers personal information
    handling, cross-border disclosure under APP 8, government identifier
    restrictions (TFN, ABN, Medicare), notifiable data breach obligations,
    and reasonable-steps security requirements under APP 11.
  author: "loke project"
  created: "2026-04-01T00:00:00Z"
  updated: "2026-04-01T00:00:00Z"
  regulation_basis:
    - "au-privacy-act"
    - "au-tfn-guidelines"
    - "au-ndb-scheme"
  tags:
    - "preset"
    - "australia"
    - "privacy"
    - "apps"

# =============================================================================
# Data Classification
# =============================================================================
# The Privacy Act distinguishes between "personal information" (s 6(1)),
# "sensitive information" (s 6(1) — a subset of personal information with
# higher protections), and "government related identifiers" (APP 9).
#
# "Sensitive information" includes health, genetic, biometric, racial/ethnic
# origin, political opinions, religious beliefs, sexual orientation, trade
# union membership, and criminal records.

data_classification:
  levels:
    - id: public
      name: "Public"
      description: "Information that is not personal information, or is publicly available as defined under the Privacy Act"
      color: "#22c55e"

    - id: internal
      name: "Internal"
      description: "Business information that does not constitute personal information within the meaning of s 6(1)"
      color: "#3b82f6"

    - id: personal
      name: "Personal Information"
      description: "Information or an opinion about an identified individual, or an individual who is reasonably identifiable (s 6(1)). Subject to all 13 APPs."
      color: "#f59e0b"

    - id: sensitive
      name: "Sensitive Information"
      description: "As defined in s 6(1): health, genetic, biometric, racial/ethnic origin, political opinions, religious beliefs, philosophical beliefs, trade union membership, sexual orientation, criminal record. Collection requires consent (APP 3.3)."
      color: "#ef4444"

    - id: prohibited
      name: "Prohibited / Government Identifiers"
      description: "Tax File Numbers, Medicare numbers, and other government-related identifiers (APP 9) that must never be disclosed to overseas recipients or transmitted externally. Also includes data under active NDB notification."
      color: "#7f1d1d"

  # APP 3 — collect only what is reasonably necessary. When in doubt,
  # assume it is personal information and apply protections.
  default_level: personal

  rules:
    # Standard personal information (s 6(1))
    - pattern: email_address
      level: personal
      description: "Email addresses are personal information"
    - pattern: phone_number
      level: personal
      description: "Phone numbers are personal information"
    - pattern: person_name
      level: personal
      description: "Names are personal information"
    - pattern: street_address
      level: personal
      description: "Addresses are personal information"
    - pattern: date_of_birth
      level: personal
      description: "Dates of birth are personal information"
    - pattern: ip_address
      level: personal
      description: "IP addresses can constitute personal information (OAIC guidance)"

    # Financial information
    - pattern: credit_card
      level: sensitive
      description: "Payment card data — elevated due to financial harm risk and NDB implications"
    - pattern: iban
      level: personal
      description: "Bank account numbers are personal information"
    - pattern: financial_record
      level: personal
      description: "Financial records are personal information"

    # Government-related identifiers (APP 9)
    # APP 9 prohibits adoption of government identifiers and restricts
    # use and disclosure. TFN Guidelines impose additional restrictions.
    - pattern: tfn
      level: prohibited
      description: "Tax File Numbers — TFN Guidelines 2015 impose strict handling. Must never be transmitted externally."
    - pattern: abn
      level: personal
      description: "Australian Business Numbers — personal information when linked to a sole trader"
    - pattern: medicare_number
      level: prohibited
      description: "Medicare numbers — government-related identifier (APP 9), must not be disclosed to overseas recipients"

    # Sensitive information (s 6(1) definition)
    - pattern: medical_record
      level: sensitive
      description: "Health information is sensitive information (s 6(1))"
    - pattern: genetic_data
      level: sensitive
      description: "Genetic information is sensitive information (s 6(1))"

    # Other national identifiers (may appear in Australian data)
    - pattern: ssn
      level: prohibited
      description: "Foreign national identifiers — treat as prohibited"

    # Technical / credentials
    - pattern: api_key
      level: prohibited
      description: "Credentials must never be transmitted"
    - pattern: password
      level: prohibited
      description: "Credentials must never be transmitted"

# =============================================================================
# Provider Restrictions
# =============================================================================
# APP 8 — Cross-border disclosure of personal information:
#   Before disclosing personal information to an overseas recipient, an
#   organisation must take reasonable steps to ensure the overseas recipient
#   does not breach the APPs (APP 8.1). The organisation remains accountable
#   for the overseas recipient's handling of the data.
#
# Exceptions (APP 8.2): informed consent, required by law, or the recipient
# is subject to substantially similar laws with enforceable mechanisms.
#
# Countries with privacy laws the OAIC has recognised as substantially
# similar are limited. In practice, organisations must conduct their own
# assessment of each overseas recipient.

provider_restrictions:
  default_action: deny

  providers:
    # Local models — no disclosure, APP 8 not triggered
    - id: local
      action: allow
      max_classification: prohibited
      note: "Local inference — no cross-border disclosure"

    - id: ollama
      action: allow
      max_classification: prohibited
      note: "Ollama runs locally"

    # US-based providers — APP 8 requires reasonable steps
    # US providers with Australian data handling addenda and local
    # processing options may be permitted for personal information
    # after anonymisation
    - id: anthropic
      action: allow
      max_classification: personal
      regions:
        - "au"
        - "us"
      require_encryption: true
      note: >
        APP 8 — organisation remains accountable for overseas recipient.
        Ensure Anthropic's DPA covers APP compliance. Sensitive information
        must not be sent; personal information must be anonymised first.

    - id: openai
      action: allow
      max_classification: personal
      regions:
        - "au"
        - "us"
      require_encryption: true
      note: "APP 8 — requires DPA covering APP compliance"

    - id: google
      action: allow
      max_classification: personal
      regions:
        - "au"
        - "us"
      require_encryption: true
      note: "Google Cloud has Australian regions — prefer au region"

    # EU-based providers (adequate privacy frameworks)
    - id: mistral
      action: allow
      max_classification: personal
      regions:
        - "eu"
      require_encryption: true
      note: "EU-based — GDPR provides comparable protections to APPs"

    - id: "*"
      action: deny
      reason: >
        Provider not approved under APP 8 cross-border disclosure assessment.
        Contact your privacy officer to conduct an APP 8 assessment for this
        provider before use.

# =============================================================================
# MCP Server Controls
# =============================================================================

mcp_servers:
  default_action: deny

  servers:
    # Local MCP servers
    - pattern: "filesystem"
      action: allow
      max_classification: sensitive
      data_filters:
        - exclude_patterns:
            - "*.env"
            - "*.pem"
            - "*.key"
            - "*credentials*"
            - "*secret*"
            - "*.tfn"                  # TFN-related files
      note: "Local filesystem access"

    - pattern: "git"
      action: allow
      max_classification: personal

    - pattern: "database-*"
      action: allow
      max_classification: personal
      data_filters:
        - mask_columns:
            - "email"
            - "phone"
            - "mobile"
            - "name"
            - "first_name"
            - "last_name"
            - "surname"
            - "given_name"
            - "date_of_birth"
            - "dob"
            - "address"
            - "tfn"
            - "tax_file_number"
            - "medicare"
            - "medicare_number"
            - "abn"
            - "drivers_licence"
            - "passport"

    # Cloud MCP servers — require anonymisation (APP 8 / APP 11)
    - pattern: "slack"
      action: allow
      max_classification: internal
      require_anonymisation: true

    - pattern: "jira"
      action: allow
      max_classification: internal
      require_anonymisation: true

    - pattern: "*"
      action: deny
      reason: "Unapproved MCP server. Requires APP 8 cross-border assessment and privacy officer approval."

  tool_controls:
    - server: "database-*"
      tool: "execute_query"
      action: allow
      constraints:
        read_only: true

# =============================================================================
# Sensitivity Thresholds
# =============================================================================
# APP 11 — reasonable steps to protect personal information from misuse,
# interference, loss, unauthorised access, modification, or disclosure.
# Detection thresholds set conservatively to meet the "reasonable steps"
# standard.

sensitivity_thresholds:
  pii_detection_threshold: 0.65
  auto_anonymise_threshold: 0.85
  review_threshold: 0.45

  actions:
    public:
      require_anonymisation: false
      allow_cloud: true
      require_user_confirmation: false
      log_level: info

    internal:
      require_anonymisation: false
      allow_cloud: true
      require_user_confirmation: false
      log_level: info

    personal:
      # APP 6 — use only for the purpose of collection (or directly related)
      # Anonymise before external processing to limit disclosure
      require_anonymisation: true
      allow_cloud: true
      require_user_confirmation: false
      log_level: standard

    sensitive:
      # APP 3.3 — collection of sensitive information requires consent
      # APP 6.2(a) — use/disclosure requires consent for sensitive information
      require_anonymisation: true
      allow_cloud: true
      require_user_confirmation: true
      log_level: detailed

    prohibited:
      # TFN Guidelines / Medicare — must never leave device
      require_anonymisation: false
      allow_cloud: false
      require_user_confirmation: false
      log_level: detailed

# =============================================================================
# Budget Limits
# =============================================================================
# No Privacy Act-specific budget requirements.

budget_limits:
  currency: "AUD"
  global:
    monthly: 150.00
  on_exceed:
    action: warn_and_block
    downgrade_to: "local"
    notification: true
    allow_override: true
    message: "Monthly LLM budget reached. Requests routed to local models."
  token_tracking:
    warn_at_percentage: 80
    track_cached_tokens: false

# =============================================================================
# Retention
# =============================================================================
# APP 11.2 — if personal information is no longer needed for any purpose for
# which it may be used or disclosed under the APPs, and is not required to be
# retained by law, the organisation must take reasonable steps to destroy or
# de-identify the information.
#
# NDB scheme — retention of records relating to notifiable data breaches for
# assessment purposes.
#
# Note: Australian tax records must generally be retained for 5 years (Tax
# Administration Act). This policy does not override statutory retention
# obligations.

retention:
  # Audit logs — accountability and NDB scheme record-keeping
  audit_logs:
    duration: "365d"
    on_expiry: archive

  # Conversation history — APP 11.2 data minimisation
  conversations:
    duration: "30d"
    on_expiry: delete

  # PII mappings — destroy as soon as no longer needed
  pii_mappings:
    duration: "session"
    on_expiry: secure_delete

  # Semantic cache
  cache:
    duration: "14d"
    max_size: "2GB"
    on_expiry: delete

  # Deanonymisation window — short, to align with data minimisation
  deanonymisation_window:
    duration: "4h"

# =============================================================================
# Anonymisation
# =============================================================================
# APP 2 — individuals must have the option of anonymity or pseudonymity.
# APP 11 — reasonable steps to protect. Anonymisation before external
# processing is a key protective measure.
#
# The OAIC's guidance on de-identification (2018) recommends that
# organisations apply techniques that make re-identification not reasonably
# likely, considering available information and reasonably foreseeable
# advances in technology.

anonymisation:
  default_level: comprehensive

  levels:
    minimal:
      description: "Structured PII only"
      layers: [regex]
      placeholder_format: "[$TYPE]"

    standard:
      description: "Structured PII and named entities"
      layers: [regex, nlp]
      placeholder_format: "$t$n"

    comprehensive:
      description: "Full de-identification per OAIC guidance"
      layers: [regex, nlp, slm_ner, presidio]
      placeholder_format: "$t$n"

    maximum:
      description: "Comprehensive plus generalisation — for sensitive information"
      layers: [regex, nlp, slm_ner, presidio]
      placeholder_format: "$t$n"
      generalise_dates: true
      generalise_locations: true
      generalise_ages: true
      suppress_rare_values: true

  entity_overrides:
    # Government identifiers — always redact, never reversible
    tfn:
      action: redact
    medicare_number:
      action: redact

    # Payment data
    credit_card:
      action: redact

    # Health data — redact (sensitive information)
    medical_record:
      action: redact
    genetic_data:
      action: redact

    # Standard personal information — anonymise (reversible within window)
    email_address:
      action: anonymise
    person_name:
      action: anonymise
    phone_number:
      action: anonymise
    street_address:
      action: anonymise
    date_of_birth:
      action: anonymise
    organisation_name:
      action: anonymise
    ip_address:
      action: anonymise

    # ABN — mask (keep business context, obscure specific number)
    abn:
      action: mask

    # Financial
    iban:
      action: anonymise

    # Credentials
    api_key:
      action: redact
    password:
      action: redact

  allow_deanonymisation: true
  deanonymisation_requires_auth: false
