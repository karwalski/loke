# =============================================================================
# loke Policy Preset: EU General Data Protection Regulation (GDPR)
# =============================================================================
#
# Implements requirements from Regulation (EU) 2016/679 (GDPR), including:
#   - Article 5:  Principles of data processing (lawfulness, fairness,
#                 transparency, purpose limitation, data minimisation,
#                 accuracy, storage limitation, integrity, accountability)
#   - Article 6:  Lawful basis for processing
#   - Article 9:  Special categories of personal data (health, biometric,
#                 genetic, political opinions, religious beliefs, trade union,
#                 sexual orientation, racial/ethnic origin)
#   - Article 17: Right to erasure ("right to be forgotten")
#   - Article 25: Data protection by design and by default
#   - Article 32: Security of processing
#   - Article 33: Breach notification (72-hour rule)
#   - Article 35: Data protection impact assessment
#   - Article 44-49: Cross-border transfer restrictions (adequacy decisions,
#                    SCCs, BCRs)
#   - Article 37-39: Data Protection Officer requirements
#
# This preset is a starting point. Organisations must review and adapt it to
# their specific processing activities, lawful bases, and DPA guidance.
#
# =============================================================================

policy_version: "1.0"

metadata:
  name: "EU GDPR Compliance"
  id: "eu-gdpr"
  description: >
    Privacy policy implementing EU General Data Protection Regulation
    (Regulation 2016/679) requirements for LLM interactions. Enforces data
    minimisation, purpose limitation, cross-border transfer restrictions, and
    special category data protections.
  author: "loke project"
  created: "2026-04-01T00:00:00Z"
  updated: "2026-04-01T00:00:00Z"
  regulation_basis:
    - "eu-gdpr"
  tags:
    - "preset"
    - "eu"
    - "eea"
    - "gdpr"
    - "privacy"

# =============================================================================
# Data Classification
# =============================================================================
# GDPR distinguishes between "personal data" (Art. 4(1)) and "special
# categories of personal data" (Art. 9). This classification maps those
# concepts to loke's tiered model.

data_classification:
  levels:
    - id: public
      name: "Public"
      description: "Non-personal data or data manifestly made public by the data subject (Art. 9(2)(e))"
      color: "#22c55e"

    - id: internal
      name: "Internal / Legitimate Interest"
      description: "Business data that does not contain personal data, or anonymised data that no longer relates to an identifiable person (Recital 26)"
      color: "#3b82f6"

    - id: personal
      name: "Personal Data"
      description: "Any information relating to an identified or identifiable natural person (Art. 4(1)). Includes names, emails, identifiers, location data, online identifiers."
      color: "#f59e0b"

    - id: special-category
      name: "Special Category Data"
      description: "Data revealing racial/ethnic origin, political opinions, religious beliefs, trade union membership, genetic data, biometric data, health data, sex life/orientation (Art. 9(1))"
      color: "#ef4444"

    - id: prohibited
      name: "Prohibited"
      description: "Data that must never be transmitted externally under any circumstances. Includes unencrypted special category data and data subject to active erasure requests."
      color: "#7f1d1d"

  # GDPR Art. 25 — data protection by default. When in doubt, treat as personal.
  default_level: personal

  rules:
    # Identifiers (Art. 4(1) — personal data)
    - pattern: email_address
      level: personal
      description: "Email addresses are personal data (direct identifier)"
    - pattern: phone_number
      level: personal
      description: "Phone numbers are personal data (direct identifier)"
    - pattern: person_name
      level: personal
      description: "Names are personal data (direct identifier)"
    - pattern: street_address
      level: personal
      description: "Addresses are personal data"
    - pattern: date_of_birth
      level: personal
      description: "Date of birth is personal data"
    - pattern: ip_address
      level: personal
      description: "IP addresses are personal data (Recital 30, Breyer v Germany C-582/14)"

    # Financial identifiers
    - pattern: iban
      level: personal
      description: "Bank account numbers are personal data"
    - pattern: credit_card
      level: special-category
      description: "Payment card numbers — elevated due to financial harm risk"

    # National identifiers
    - pattern: ssn
      level: special-category
      description: "National identification numbers — elevated sensitivity under most EU member state laws"
    - pattern: nhs_number
      level: special-category
      description: "UK/EU health system identifiers"

    # Special category data (Art. 9)
    - pattern: medical_record
      level: special-category
      description: "Health data (Art. 9(1)) — processing prohibited unless Art. 9(2) exception applies"
    - pattern: genetic_data
      level: special-category
      description: "Genetic data (Art. 9(1))"

    # Technical identifiers
    - pattern: api_key
      level: prohibited
      description: "Credentials must never be transmitted"
    - pattern: password
      level: prohibited
      description: "Credentials must never be transmitted"

# =============================================================================
# Provider Restrictions
# =============================================================================
# GDPR Art. 44-49 restrict transfers of personal data outside the EEA unless
# adequate safeguards exist. The European Commission maintains a list of
# countries with adequacy decisions (Art. 45). For other countries, Standard
# Contractual Clauses (SCCs) or Binding Corporate Rules (BCRs) are required.
#
# Post-Schrems II (C-311/18), transfers to the US require the EU-US Data
# Privacy Framework (DPF) certification or supplementary measures.

provider_restrictions:
  # Default: deny providers unless explicitly approved
  default_action: deny

  providers:
    # Local models — no data transfer, no GDPR transfer restrictions apply
    - id: local
      action: allow
      max_classification: prohibited    # Local processing has no transfer risk
      note: "Local inference involves no third-party data transfer"

    - id: ollama
      action: allow
      max_classification: prohibited
      note: "Ollama runs locally — no transfer"

    # Anthropic — US-based, EU-US DPF participant
    # Verify current DPF certification at https://www.dataprivacyframework.gov
    - id: anthropic
      action: allow
      max_classification: personal      # Personal data allowed (after anonymisation)
      regions:
        - "eu"                          # Prefer EU-based processing where available
        - "us"                          # US permitted under DPF
      require_encryption: true
      note: "Requires valid EU-US DPF certification. Special category data must not be sent."

    # OpenAI — US-based, EU-US DPF participant
    - id: openai
      action: allow
      max_classification: personal
      regions:
        - "eu"
        - "us"
      require_encryption: true
      note: "Requires valid EU-US DPF certification and DPA (Data Processing Addendum)"

    # Google — US-based, EU-US DPF participant
    - id: google
      action: allow
      max_classification: personal
      regions:
        - "eu"
        - "us"
      require_encryption: true

    # Mistral — French company, EU-based processing
    - id: mistral
      action: allow
      max_classification: personal
      regions:
        - "eu"
      require_encryption: true
      note: "EU-based provider — no cross-border transfer concerns for EEA processing"

    # Catch-all: deny unapproved providers
    - id: "*"
      action: deny
      reason: >
        Provider not approved for GDPR-compliant processing. Cross-border data
        transfers require adequacy decisions, SCCs, or BCRs (GDPR Art. 44-49).
        Contact your Data Protection Officer to request provider approval.

# =============================================================================
# MCP Server Controls
# =============================================================================
# MCP servers that access personal data are "processors" under GDPR Art. 28
# and require appropriate agreements. Local MCP servers processing data
# on-device are not transfers, but cloud MCP servers are.

mcp_servers:
  default_action: deny

  servers:
    # Local MCP servers — no transfer, permitted
    - pattern: "filesystem"
      action: allow
      max_classification: special-category
      data_filters:
        - exclude_patterns:
            - "*.env"
            - "*.pem"
            - "*.key"
            - "*credentials*"
            - "*secret*"
      note: "Local filesystem — no data leaves device"

    - pattern: "git"
      action: allow
      max_classification: personal
      note: "Local git access"

    - pattern: "database-*"
      action: allow
      max_classification: personal
      data_filters:
        - mask_columns:
            - "email"
            - "phone"
            - "name"
            - "first_name"
            - "last_name"
            - "date_of_birth"
            - "dob"
            - "address"
            - "ssn"
            - "national_id"
            - "ip_address"
      note: "Database access with PII column masking"

    # Cloud MCP servers — require anonymisation
    - pattern: "slack"
      action: allow
      max_classification: internal
      require_anonymisation: true
      note: "Cloud service — personal data must be anonymised before sending"

    - pattern: "jira"
      action: allow
      max_classification: internal
      require_anonymisation: true

    # Deny cloud storage MCPs by default (high risk of personal data exposure)
    - pattern: "google-drive"
      action: deny
      reason: "Cloud storage MCP not approved — risk of uncontrolled personal data transfer"

    - pattern: "dropbox"
      action: deny
      reason: "Cloud storage MCP not approved"

    - pattern: "*"
      action: deny
      reason: "Unapproved MCP server. Requires GDPR Art. 28 processor agreement and DPO approval."

  tool_controls:
    # Prevent writing personal data to external locations
    - server: "filesystem"
      tool: "write_file"
      action: allow
      constraints:
        read_only: false

    - server: "database-*"
      tool: "execute_query"
      action: allow
      constraints:
        read_only: true                # Only SELECT — no writes via MCP

# =============================================================================
# Sensitivity Thresholds
# =============================================================================
# GDPR Art. 25 requires "data protection by design and by default." Detection
# thresholds are set conservatively — it is better to over-detect personal data
# than to miss it.

sensitivity_thresholds:
  # Conservative detection — catch potential personal data even at lower confidence
  pii_detection_threshold: 0.6
  auto_anonymise_threshold: 0.85
  review_threshold: 0.4

  actions:
    public:
      require_anonymisation: false
      allow_cloud: true
      require_user_confirmation: false
      log_level: info

    internal:
      require_anonymisation: false
      allow_cloud: true
      require_user_confirmation: false
      log_level: info

    personal:
      # Art. 5(1)(c) — data minimisation: anonymise personal data before external processing
      require_anonymisation: true
      allow_cloud: true
      require_user_confirmation: false
      log_level: standard

    special-category:
      # Art. 9 — processing of special categories generally prohibited
      # With anonymisation, data is no longer personal data (Recital 26), so
      # cloud processing becomes permissible
      require_anonymisation: true
      allow_cloud: true
      require_user_confirmation: true   # Extra confirmation for sensitive data
      log_level: detailed

    prohibited:
      require_anonymisation: false
      allow_cloud: false
      require_user_confirmation: false
      log_level: detailed

# =============================================================================
# Budget Limits
# =============================================================================
# No GDPR-specific budget requirements. Defaults provided as reasonable
# starting points. Organisations should set budgets based on their own needs.

budget_limits:
  currency: "EUR"
  global:
    monthly: 100.00
  on_exceed:
    action: warn_and_block
    downgrade_to: "local"
    notification: true
    allow_override: true               # Budget is not a regulatory requirement
    message: "Monthly LLM budget reached. Requests routed to local models."
  token_tracking:
    warn_at_percentage: 80
    track_cached_tokens: false

# =============================================================================
# Retention
# =============================================================================
# GDPR Art. 5(1)(e) — storage limitation: personal data must not be kept
# longer than necessary. Art. 17 — right to erasure requires the ability to
# delete all personal data on request.
#
# Audit logs must be retained long enough for accountability (Art. 5(2)) but
# must not contain personal data themselves.

retention:
  # Audit logs — accountability obligation (Art. 5(2))
  # Logs must be anonymised (no personal data in log entries)
  audit_logs:
    duration: "365d"
    on_expiry: archive

  # Conversation history — data minimisation (Art. 5(1)(e))
  conversations:
    duration: "30d"
    on_expiry: delete

  # PII mappings — minimise retention of reversible anonymisation data
  pii_mappings:
    duration: "session"
    on_expiry: secure_delete

  # Semantic cache
  cache:
    duration: "14d"
    max_size: "2GB"
    on_expiry: delete

  # Deanonymisation window — keep short to support data minimisation
  # Once this expires, anonymisation becomes irreversible (effectively deletion
  # of the personal data element — supports Art. 17 right to erasure)
  deanonymisation_window:
    duration: "4h"

# =============================================================================
# Anonymisation
# =============================================================================
# GDPR Recital 26: "The principles of data protection should therefore not
# apply to anonymous information, namely information which does not relate to
# an identified or identifiable natural person or to personal data rendered
# anonymous in such a manner that the data subject is not or no longer
# identifiable."
#
# Effective anonymisation removes data from GDPR scope entirely. loke uses
# comprehensive anonymisation as the default for GDPR compliance.

anonymisation:
  # Comprehensive by default — use all detection layers
  default_level: comprehensive

  levels:
    minimal:
      description: "Structured PII only — insufficient for GDPR compliance in most cases"
      layers: [regex]
      placeholder_format: "[$TYPE]"

    standard:
      description: "Structured PII plus named entities"
      layers: [regex, nlp]
      placeholder_format: "$t$n"

    comprehensive:
      description: "Full anonymisation — satisfies GDPR Recital 26 for most processing"
      layers: [regex, nlp, slm_ner, presidio]
      placeholder_format: "$t$n"

    maximum:
      description: "Comprehensive plus generalisation — for special category data or high-risk processing"
      layers: [regex, nlp, slm_ner, presidio]
      placeholder_format: "$t$n"
      generalise_dates: true
      generalise_locations: true
      generalise_ages: true
      suppress_rare_values: true

  entity_overrides:
    # Payment data — redact, never reversible
    credit_card:
      action: redact

    # National IDs — redact, never reversible
    ssn:
      action: redact

    # Health data — redact (Art. 9 special category)
    medical_record:
      action: redact

    # Genetic data — redact (Art. 9 special category)
    genetic_data:
      action: redact

    # Standard personal data — anonymise (reversible within deanonymisation window)
    email_address:
      action: anonymise
    person_name:
      action: anonymise
    phone_number:
      action: anonymise
    street_address:
      action: anonymise
    date_of_birth:
      action: anonymise
    organisation_name:
      action: anonymise
    ip_address:
      action: anonymise

    # Credentials — always redact
    api_key:
      action: redact
    password:
      action: redact

  # Allow deanonymisation within the window (for response reconstruction)
  allow_deanonymisation: true
  deanonymisation_requires_auth: false
